<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf - Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; margin-bottom: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup-screen" class="screen active">
            <h1>🐺 Werewolf</h1>
            <div class="input-group">
                <label>Number of Players (5-12)</label>
                <input type="number" id="player-count" min="5" max="12" value="6">
            </div>
            <button class="btn" onclick="goToNames()">Next →</button>
        </div>
        
        <div id="names-screen" class="screen">
            <h1>👥 Players</h1>
            <div id="name-inputs"></div>
            <button class="btn" onclick="alert('Game would start!')">Start Game!</button>
            <button class="btn" onclick="goBack()" style="background: #f0f0f0; color: #333;">← Back</button>
        </div>
    </div>

    <script>
        function goToNames() {
            const count = parseInt(document.getElementById('player-count').value);
            if (count < 5 || count > 12) {
                alert('Please enter 5-12 players');
                return;
            }
            
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'input-group';
                div.innerHTML = '<label>Player ' + (i + 1) + '</label><input type="text" value="Player ' + (i + 1) + '">';
                container.appendChild(div);
            }
            
            showScreen('names-screen');
        }
        
        function goBack() {
            showScreen('setup-screen');
        }
        
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
